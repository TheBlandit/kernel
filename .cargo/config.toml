[build]
target = "x86_64-unknown-uefi"
rustflags = [
    "-C", "target-feature=-mmx,-sse,-sse2,-sse3,-ssse3,-sse4.1,-sse4.2,-avx,-avx2,-avx512f,-avx512bw,-avx512cd,-avx512dq,-avx512vl,-f16c,-fma,-fxsr",
    "-C", "no-redzone",
    # "-C", "link-arg=-nostdlib",
    # "-C", "link-arg=-static",
    # "-C", "code-model=kernel",
    "-C", "code-model=kernel",
    "-C", "no-redzone",
    "-C", "relocation-model=pie",
    # "-C", "no-vectorize-loops",
    # "-C", "no-vectorize-slp",
]
